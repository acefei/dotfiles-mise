# ==================================
# ===  tmux (Ver > 2.1) settings ===
# ==================================

# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Start index of window/pane with 1, because we're humans, not computers
set -g base-index 1
setw -g pane-base-index 1

# Re-order windows automatically
set-option -g renumber-windows on

# Highlight active window
set -g mode-style bg=red,fg=green,blink

# Status bar
set -g status-style bg=black,fg=white
set -g status-left '#[fg=green,bold][#S] '
set -g status-left-length 20
set -g status-right '#[fg=yellow]%H:%M'
setw -g window-status-current-style fg=black,bg=green,bold
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '
setw -g automatic-rename off

# reload config (prefix r)
bind r source ~/.tmux.conf \; display "Configuration reloaded!"

# ==========================
# ===   Key bindings     ===
# ==========================
# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Act like Vim
set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize pane
bind -r ^k resizep -U 10 # upward (prefix Ctrl+k)
bind -r ^j resizep -D 10 # downward (prefix Ctrl+j)
bind -r ^h resizep -L 10 # to the left (prefix Ctrl+h)
bind -r ^l resizep -R 10 # to the right (prefix Ctrl+l)

# ==========================
# ===   Claude / AI      ===
# ==========================
# Allow OSC passthrough (multiline prompts, hyperlinks from claude CLI)
set -g allow-passthrough on

# Extended keys so modifier+key combos reach the CLI cleanly
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Activity hints when a background agent pane produces output
setw -g monitor-activity on
set  -g visual-activity off


# ======================================================
# === Please keep this at the bottom of ~/.tmux.conf ===
# ======================================================
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ── Resume after reboot ───────────────────────────────────────────────────
# tmux-resurrect: restore sessions/windows/panes (incl. working directories).
# tmux-continuum: auto-save every 15 min, auto-restore on tmux server start.
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Restart selected programs in their panes on restore.
# "~name" tells resurrect: when a pane was running `name`, relaunch it with
# its original full argv (flags preserved).
set -g @resurrect-processes '"~vim" "~nvim" "~ssh" "~git" "~htop" "~tail" "~less" "~docker" "~claude"'

# Ensure resurrect save directory exists on first run
run-shell 'mkdir -p ~/.tmux/resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
