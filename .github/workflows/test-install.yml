name: Installation on Various OS

on:
  push:
    paths:
      - 'install.sh'
      - 'mise.toml'
      - '.mise/tasks/**'
      - 'agents/**'
      - 'config/**'
      - 'shell/**'
      - 'Skillfile'
      - 'Skillfile.lock'
      - '.github/workflows/test-install.yml'
  pull_request:
    paths:
      - 'install.sh'
      - 'mise.toml'
      - '.mise/tasks/**'
      - 'agents/**'
      - 'config/**'
      - 'shell/**'
      - 'Skillfile'
      - 'Skillfile.lock'
      - '.github/workflows/test-install.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  install:
    name: install on ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container_image }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04
            container_image: ubuntu:22.04
            pre_checkout_cmd: |
              apt-get update
              apt-get install -y git curl ca-certificates
            build_deps_cmd: |
              apt-get update
              apt-get install -y build-essential pkg-config libssl-dev xz-utils
          - name: ubuntu-24.04
            container_image: ubuntu:24.04
            pre_checkout_cmd: |
              apt-get update
              apt-get install -y git curl ca-certificates
            build_deps_cmd: |
              apt-get update
              apt-get install -y build-essential pkg-config libssl-dev xz-utils
          - name: fedora-41
            container_image: fedora:41
            pre_checkout_cmd: |
              dnf -y update
              dnf -y install git curl ca-certificates
            build_deps_cmd: |
              dnf -y install gcc make pkgconf-pkg-config openssl-devel xz tar findutils which

    steps:
      - name: Install base dependencies
        run: |
          ${{ matrix.pre_checkout_cmd }}

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          ${{ matrix.build_deps_cmd }}

      - name: Run install script
        env:
          CI: "true"
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          bash ./install.sh

  install-macos:
    name: install on macos
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run install script
        env:
          CI: "true"
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          bash ./install.sh
